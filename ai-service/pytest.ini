# AI Service pytest configuration
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show output
addopts = -v --tb=short

# Timeout for tests (in seconds)
timeout = 30

# Coverage settings
[coverage:run]
source = .
omit = 
    tests/*
    __pycache__/*
    venv/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
