services:
  # ----------------------------------------------------------------------------
  # 1. AI Python Service (FastAPI)
  # ----------------------------------------------------------------------------
  - type: web
    name: smart-food-ai-service
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free # Change to starter for better performance

  # ----------------------------------------------------------------------------
  # 2. Backend Node.js Service (Express)
  # ----------------------------------------------------------------------------
  - type: web
    name: smart-food-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: smart-food-ai-service
          envVarKey: RENDER_EXTERNAL_URL

  # ----------------------------------------------------------------------------
  # 3. Frontend Next.js Service
  # ----------------------------------------------------------------------------
  - type: web
    name: smart-food-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # IMPORTANT: Set this to [BACKEND_URL]/api/ in Dashboard
