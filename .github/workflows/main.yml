name: Full-Stack CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: backend

      - name: Run Lint
        run: npm run lint
        working-directory: backend

      - name: Run Tests
        run: npm test
        working-directory: backend

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: Run Lint
        run: npm run lint
        working-directory: frontend

      - name: Build Next.js
        run: npm run build
        working-directory: frontend

  ai-service:
    name: AI Service CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt
        working-directory: ai-service

      - name: Verify API Module
        run: python -c "from api import app; print('✅ FastAPI app imports successfully')"
        working-directory: ai-service

      - name: Run Pytest Validation
        run: pytest tests/ -v
        working-directory: ai-service

  deploy:
    name: Continuous Deployment
    needs: [backend, frontend, ai-service]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deployments
        run: |
          echo "Triggering AI Service Deployment..."
          curl -X POST -s "${{ secrets.RENDER_DEPLOY_HOOK_AI }}" || true
          
          echo "Triggering Backend Deployment..."
          curl -X POST -s "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" || true
          
          echo "Triggering Frontend Deployment..."
          curl -X POST -s "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" || true
